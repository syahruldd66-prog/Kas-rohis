<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS KELAS PRO - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #4f46e5; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.6s ease;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.2);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .admin-only { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="loader-wrapper">
        <div class="spinner"></div>
        <div id="loading-text" class="mt-5 text-white font-bold text-center px-10">Mengkoneksikan ke Database...</div>
    </div>

    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-slate-800">KAS KELAS <span class="text-indigo-600">PRO</span></h1>
            <button onclick="toggleAdmin()" id="btnAdmin" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-xs font-black shadow-sm">
                🔐 Login Admin
            </button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 lg:p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="md:col-span-2 bg-indigo-600 rounded-[2rem] p-8 text-white shadow-xl shadow-indigo-100">
                <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-2">Periode Laporan</p>
                <select id="filterBulan" onchange="fetchData()" class="bg-indigo-700 text-white font-black text-2xl p-2 rounded-2xl outline-none cursor-pointer mb-4">
                    <option value="Januari">Januari</option><option value="Februari">Februari</option>
                    <option value="Maret">Maret</option><option value="April">April</option>
                    <option value="Mei">Mei</option><option value="Juni">Juni</option>
                    <option value="Juli">Juli</option><option value="Agustus">Agustus</option>
                    <option value="September">September</option><option value="Oktober">Oktober</option>
                    <option value="November">November</option><option value="Desember">Desember</option>
                </select>
                <h2 id="totalBulanIni" class="text-4xl font-black mt-2">Rp 0</h2>
                <p class="text-[10px] uppercase font-bold tracking-widest mt-1 opacity-70 italic">*Data disinkronkan secara Cloud</p>
            </div>
            <div class="bg-white border border-slate-200 rounded-[2rem] p-8 flex flex-col justify-center shadow-sm">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Anggota Lunas</p>
                <h3 id="countLunas" class="text-3xl font-black text-slate-800">0 / 29</h3>
                <div class="w-full bg-slate-100 h-2 rounded-full mt-4 overflow-hidden">
                    <div id="progressBar" class="bg-emerald-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div id="adminPanel" class="admin-only lg:col-span-1">
                <div class="bg-white p-7 rounded-[2rem] border-2 border-indigo-500 shadow-xl sticky top-28">
                    <h3 class="text-slate-800 font-black mb-6 flex items-center gap-2">✍️ Input Admin</h3>
                    <div class="space-y-4">
                        <select id="nama" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-bold text-slate-700"></select>
                        <input type="number" id="jumlah" placeholder="Nominal Rp" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-bold">
                        <button onclick="tambahData()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">SIMPAN</button>
                    </div>
                </div>
            </div>

            <div id="tableSection" class="lg:col-span-3">
                <div class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
                    <div class="overflow-x-auto max-h-[600px]">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-100">
                                <tr class="text-[10px] text-slate-400 font-black uppercase tracking-widest">
                                    <th class="p-6">Anggota</th>
                                    <th class="p-6 text-right">Terbayar</th>
                                    <th class="p-6 text-right">Sisa</th>
                                    <th class="p-6 text-center">Status</th>
                                    <th class="admin-only p-6 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabelRingkasan" class="text-sm font-semibold"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG (WAJIB ISI) ---
        const SUPABASE_URL = 'https://fxepkqgcszgrhkkvnmqi.supabase.co'; // Masukkan Project URL-mu
        const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4ZXBrcWdjc3pncmhra3ZucW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDYxNDUsImV4cCI6MjA5MzYyMjE0NX0.sXy0BWZE4ta8wl_ywjUMytXKpb_BoMr5gUmVAj6IMPc'; // Key yang kamu kirim tadi
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TARGET_KAS = 10000;
        const PASSWORD_ADMIN = "admin123";
        const DAFTAR_ANGGOTA = ["Aldi Supriadi", "Almira Ramadhani", "Andi Fadhil Rumpang", "Andi Muh Luqman", "Andi Ratu Bilqis", "Andi Syahrul Yudiono", "Anditenrilengka", "Arkan Fikri", "Besse Nurfadillah", "Evi Agnesia", "Febri Aulya Kasunaya", "Fitria", "Melinda Saputri", "Muh Fikran", "Muh Ilham", "Muh. Iqbal", "Muh. Resky Wijaya", "Muhammad Sa'ad Hamzah", "Naswa", "Nur Asmil Hasanah", "Nurul Alifiyatul Aswan", "Nurul Sabila Ramadhani", "Putriani", "Reski Sulistia", "Saskia", "Syahrul (Admin)", "Yuliana", "Zahrah Rahmadhani", "Muh Fauzan Hidayatullah"].sort();

        let isAdmin = false;
        let allDataKas = [];

        // Loading Screen Kata-kata
        const loadingWords = ["Mengkoneksikan ke Cloud...", "Mengecek daftar iuran...", "Sabar, lagi narik data...", "Uang kas lancar, kelas aman!"];
        let wordIdx = 0;
        setInterval(() => {
            const el = document.getElementById('loading-text');
            if(el) el.innerText = loadingWords[wordIdx % loadingWords.length];
            wordIdx++;
        }, 800);

        // Inisialisasi
        window.onload = () => {
            fetchData();
            const selectNama = document.getElementById('nama');
            DAFTAR_ANGGOTA.forEach(n => {
                let opt = document.createElement('option');
                opt.value = n; opt.innerText = n;
                selectNama.appendChild(opt);
            });
            // Auto select current month
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('filterBulan').value = months[new Date().getMonth()];
            
            setTimeout(() => {
                document.getElementById('loader-wrapper').style.opacity = '0';
                setTimeout(() => document.getElementById('loader-wrapper').style.display = 'none', 600);
            }, 3000);
        };

        async function fetchData() {
            const { data, error } = await supabaseClient.from('kas_pembayaran').select('*');
            if (!error) {
                allDataKas = data;
                render();
            }
        }

        async function tambahData() {
            const nama = document.getElementById('nama').value;
            const jumlah = document.getElementById('jumlah').value;
            const bulan = document.getElementById('filterBulan').value;
            if (nama && jumlah) {
                const { error } = await supabaseClient.from('kas_pembayaran').insert([{ nama, jumlah: parseInt(jumlah), bulan }]);
                if (!error) {
                    document.getElementById('jumlah').value = '';
                    fetchData();
                } else { alert("Error simpan data!"); }
            }
        }

        async function hapusEntry(nama, bulan) {
            if(confirm(`Hapus data ${nama} bulan ${bulan}?`)) {
                const { error } = await supabaseClient.from('kas_pembayaran').delete().match({ nama, bulan });
                if (!error) fetchData();
            }
        }

        function render() {
            const bulan = document.getElementById('filterBulan').value;
            const tbody = document.getElementById('tabelRingkasan');
            tbody.innerHTML = '';
            let totalBulanIni = 0;
            let lunasCount = 0;
            let rekap = {};
            DAFTAR_ANGGOTA.forEach(n => rekap[n] = 0);

            allDataKas.filter(d => d.bulan === bulan).forEach(item => {
                totalBulanIni += parseInt(item.jumlah);
                rekap[item.nama] += parseInt(item.jumlah);
            });

            DAFTAR_ANGGOTA.forEach(nama => {
                let bayar = rekap[nama];
                let sisa = TARGET_KAS - bayar;
                let isLunas = sisa <= 0;
                if(isLunas) lunasCount++;

                tbody.innerHTML += `
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                        <td class="p-6 font-bold text-slate-700">${nama}</td>
                        <td class="p-6 text-right text-indigo-600 font-bold">Rp ${bayar.toLocaleString()}</td>
                        <td class="p-6 text-right text-rose-500 font-mono italic">${sisa > 0 ? 'Rp ' + sisa.toLocaleString() : '–'}</td>
                        <td class="p-6 text-center">
                            <span class="${isLunas ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'} px-3 py-1 rounded-lg text-[9px] font-black uppercase">
                                ${isLunas ? 'LUNAS' : 'CICIL'}
                            </span>
                        </td>
                        <td class="admin-only p-6 text-center">
                            <button onclick="hapusEntry('${nama}', '${bulan}')" class="text-rose-400 hover:text-rose-600 font-bold text-xs">Hapus</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalBulanIni').innerText = `Rp ${totalBulanIni.toLocaleString()}`;
            document.getElementById('countLunas').innerText = `${lunasCount} / ${DAFTAR_ANGGOTA.length}`;
            document.getElementById('progressBar').style.width = (lunasCount / DAFTAR_ANGGOTA.length * 100) + '%';
            
            const adminEls = document.querySelectorAll('.admin-only');
            adminEls.forEach(el => el.style.display = isAdmin ? (el.tagName === 'TH' || el.tagName === 'TD' ? 'table-cell' : 'block') : 'none');
        }

        function toggleAdmin() {
            if (!isAdmin) {
                if (prompt("Password Admin:") === PASSWORD_ADMIN) { isAdmin = true; updateUI(); }
                else { alert("Salah!"); }
            } else { isAdmin = false; updateUI(); }
        }

        function updateUI() {
            const panel = document.getElementById('adminPanel');
            const tableSec = document.getElementById('tableSection');
            const btn = document.getElementById('btnAdmin');
            if (isAdmin) {
                panel.style.display = 'block';
                tableSec.classList.replace('lg:col-span-3', 'lg:col-span-2');
                btn.innerText = "🔓 Admin Aktif";
            } else {
                panel.style.display = 'none';
                tableSec.classList.replace('lg:col-span-2', 'lg:col-span-3');
                btn.innerText = "🔐 Login Admin";
            }
            render();
        }
    </script>
</body>
</html>
