<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas Digital - 10th Grade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-extrabold tracking-tight">KAS KELAS</h1>
            <span class="bg-indigo-500 px-3 py-1 rounded-lg text-xs font-bold">Target: Rp 10.000</span>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="text-gray-800 font-bold mb-4 flex items-center">
                    <span class="bg-indigo-100 text-indigo-600 p-2 rounded-lg mr-2 italic">✎</span> 
                    Input Bayar
                </h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Pilih Nama Anggota</label>
                        <select id="nama" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none transition appearance-none bg-slate-50">
                            <option value="">-- Pilih Nama --</option>
                            </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nominal Transfer (Rp)</label>
                        <input type="number" id="jumlah" placeholder="Contoh: 2000" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none transition bg-slate-50">
                    </div>
                    <button onclick="tambahData()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition active:scale-95">
                        Simpan Pembayaran
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl border border-slate-200">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Total Kas</p>
                    <h2 id="grandTotal" class="text-xl font-extrabold text-indigo-600">Rp 0</h2>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-200">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Anggota Lunas</p>
                    <h2 id="countLunas" class="text-xl font-extrabold text-green-500">0 / 29</h2>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-50 bg-slate-50/50 flex justify-between">
                    <h3 class="font-bold text-slate-700 text-sm">Status Cicilan Anggota</h3>
                </div>
                <div class="overflow-x-auto max-h-[400px]">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-white shadow-sm">
                            <tr class="text-[10px] text-slate-400 uppercase tracking-wider">
                                <th class="p-4">Nama Anggota</th>
                                <th class="p-4 text-right">Terbayar</th>
                                <th class="p-4 text-right">Sisa</th>
                                <th class="p-4 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelRingkasan" class="text-xs">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="flex justify-center">
                <button onclick="hapusSemua()" class="text-slate-300 hover:text-red-500 text-[10px] font-bold uppercase tracking-widest transition">
                    Reset Database (Admin Only)
                </button>
            </div>
        </div>
    </div>

    <script>
        const TARGET_KAS = 10000;
        const DAFTAR_ANGGOTA = [
            "Aldi Supriadi", "Almira Ramadhani", "Andi Fadhil Rumpang", "Andi Muh Luqman", 
            "Andi Ratu Bilqis", "Andi Syahrul Yudiono", "Anditenrilengka", "Arkan Fikri", 
            "Besse Nurfadillah", "Evi Agnesia", "Febri Aulya Kasunaya", "Fitria", 
            "Melinda Saputri", "Muh Fikran", "Muh Ilham", "Muh. Iqbal", 
            "Muh. Resky Wijaya", "Muhammad Sa'ad Hamzah", "Naswa", "Nur Asmil Hasanah", 
            "Nurul Alifiyatul Aswan", "Nurul Sabila Ramadhani", "Putriani", "Reski Sulistia", 
            "Saskia", "Syahrul (Admin)", "Yuliana", "Zahrah Rahmadhani", "Muh Fauzan Hidayatullah"
        ].sort();

        let dataKas = JSON.parse(localStorage.getItem('kas_sekolah_v1')) || [];

        // Isi Dropdown Nama
        const selectNama = document.getElementById('nama');
        DAFTAR_ANGGOTA.forEach(nama => {
            let opt = document.createElement('option');
            opt.value = nama;
            opt.innerHTML = nama;
            selectNama.appendChild(opt);
        });

        function render() {
            const ringkasanBody = document.getElementById('tabelRingkasan');
            const grandTotalElem = document.getElementById('grandTotal');
            const countLunasElem = document.getElementById('countLunas');
            
            ringkasanBody.innerHTML = '';
            let totalSemua = 0;
            let rekap = {};
            let lunasCount = 0;

            // Inisialisasi semua anggota dengan saldo 0
            DAFTAR_ANGGOTA.forEach(n => rekap[n] = 0);

            // Hitung uang masuk
            dataKas.forEach(item => {
                totalSemua += parseInt(item.jumlah);
                rekap[item.nama] += parseInt(item.jumlah);
            });

            // Tampilkan ke tabel
            DAFTAR_ANGGOTA.forEach(nama => {
                let dibayar = rekap[nama];
                let sisa = TARGET_KAS - dibayar;
                let isLunas = sisa <= 0;
                if(isLunas) lunasCount++;

                ringkasanBody.innerHTML += `
                    <tr class="border-b border-slate-50 hover:bg-indigo-50/30 transition">
                        <td class="p-4 font-bold text-slate-700">${nama}</td>
                        <td class="p-4 text-right text-indigo-600 font-semibold">Rp ${dibayar.toLocaleString()}</td>
                        <td class="p-4 text-right text-red-400 font-mono">${sisa > 0 ? 'Rp ' + sisa.toLocaleString() : '-'}</td>
                        <td class="p-4 text-center">
                            <span class="${isLunas ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} px-3 py-1 rounded-full text-[9px] font-black uppercase">
                                ${isLunas ? 'Lunas' : 'Cicil'}
                            </span>
                        </td>
                    </tr>
                `;
            });

            grandTotalElem.innerText = `Rp ${totalSemua.toLocaleString()}`;
            countLunasElem.innerText = `${lunasCount} / ${DAFTAR_ANGGOTA.length}`;
            localStorage.setItem('kas_sekolah_v1', JSON.stringify(dataKas));
        }

        function tambahData() {
            const nama = document.getElementById('nama');
            const jumlah = document.getElementById('jumlah');
            
            if (nama.value && jumlah.value) {
                dataKas.push({ 
                    nama: nama.value, 
                    jumlah: jumlah.value, 
                    tanggal: new Date().toLocaleDateString() 
                });
                jumlah.value = '';
                render();
            } else {
                alert("Pilih nama dan isi nominal bayar!");
            }
        }

        function hapusSemua() {
            if(prompt("Password Admin:") === "admin123") {
                if(confirm("Hapus semua catatan kas?")) {
                    dataKas = [];
                    render();
                }
            } else { alert("Akses ditolak!"); }
        }

        render();
    </script>
</body>
</html>
